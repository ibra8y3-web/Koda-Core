name: Koda Universal Intelligence
on: [push]
jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install numpy requests

      - name: Global Knowledge Hunter (صيد المعرفة العالمية)
        run: |
          python -c "
          import os, requests
          # كل المجالات اللي طلبتها (برمجة، رياضيات، لغات، تحليل)
          topics = ['machine-learning', 'deep-learning', 'algorithms', 'mathematics', 'natural-language-processing', 'operating-systems', 'cpp', 'python', 'javascript', 'rust', 'cybersecurity']
          os.makedirs('external', exist_ok=True)
          for topic in topics:
              print(f'🔎 جاري سحب علوم: {topic}')
              # جلب 30 مستودع من كل مجال (لضمان عدم تجاوز وقت السيرفر)
              url = f'https://api.github.com/search/repositories?q={topic}&sort=stars&order=desc&per_page=30'
              try:
                  repos = requests.get(url).json().get('items', [])
                  for repo in repos:
                      os.system(f'git clone --depth 1 {repo[\"clone_url\"]} external/{repo[\"name\"]}')
              except: continue
          "

      - name: Run Koda Multi-Brain Engine (التفكير والفهم)
        run: python koda_brain.py

      - name: Final Artifact Delivery (تسليم العقل النهائي)
        # دي الخطوة اللي كانت ناقصة.. هي دي اللي بتديك المجلد في الآخر
        uses: actions/upload-artifact@v4
        with:
          name: Koda-Final-Intelligence-Model
          path: |
            koda_brain_weights.npz
            vocab_data.json
