name: Koda Cloud Training
on: [push]
jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install numpy requests

      - name: Repo Hunter (صيد المستودعات)
        run: |
          python -c "
          import os, requests
          topics = ['machine-learning', 'python-algorithms', 'cpp-projects']
          os.makedirs('external', exist_ok=True)
          for topic in topics:
              url = f'https://api.github.com/search/repositories?q={topic}&sort=stars&order=desc&per_page=5'
              repos = requests.get(url).json().get('items', [])
              for repo in repos:
                  os.system(f'git clone --depth 1 {repo[\"clone_url\"]} external/{repo[\"name\"]}')
          "

      - name: Run Engine & Save Brain
        run: python koda_brain.py

      - name: Upload Brain File (تحميل الملف النهائي)
        uses: actions/upload-artifact@v4
        with:
          name: koda-final-brain
          path: koda_brain_weights.npz
