name: Koda Continuous Intelligence

on:
push:
schedule:
- cron: "0 */6 * * *"

jobs:
train:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v3

  - name: Restore Memory
    uses: actions/download-artifact@v4
    with:
      name: Koda-Memory
    continue-on-error: true

  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: "3.10"

  - name: Install deps
    run: pip install numpy requests

  - name: Run Brain
    run: python koda_brain.py

  - name: Save Memory
    uses: actions/upload-artifact@v4
    with:
      name: Koda-Memory
      path: |
        memory/
        progress.json

  - name: Final Output
    uses: actions/upload-artifact@v4
    with:
      name: Koda-Final
      path: memory/
```

