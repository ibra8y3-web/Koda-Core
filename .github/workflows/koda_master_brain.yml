name: Koda Universal Master Brain
on:
  push:
    branches: [ "main", "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Train:
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 تنظيف السيرفر لأقصى درجة
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          
      - name: 📥 سحب الكود الحالي
        uses: actions/checkout@v4
        
      - name: ⚙️ تجهيز البيئة
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 تثبيت مكتبات الذكاء (NLP & ML)
        run: pip install numpy tensorflow keras transformers nltk torch
        
      - name: 🧠 سحب ذكي + تدريب عميق
        continue-on-error: true
        run: |
          python init_koda.py
          python main_brain.py
          
      - name: 💾 رفع العقل النهائي (Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Koda-Final-Brain
          path: |
            *.h5
            *.json
            models/
