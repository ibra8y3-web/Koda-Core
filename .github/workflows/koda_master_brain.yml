name: Koda Universal Master Brain (NLP & Deep Learning)
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  Train-And-Extract:
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 1. التدمير الشامل وتفريغ أقصى مساحة للسيرفر (لتحمل 10000 مستودع)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: 📥 2. جلب هيكل مشروع كودا الأساسي
        uses: actions/checkout@v4

      - name: ⚙️ 3. تجهيز بيئة الذكاء الاصطناعي (ML & Neural Networks)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 4. تثبيت مكتبات العقل العميق والتوليد اللغوي
        run: |
          pip install numpy tensorflow keras transformers nltk torch torchvision pandas

      - name: 🌍 5. سحب المعرفة الكونية (10,000 مستودع) - السحب الذكي
        continue-on-error: true
        run: |
          echo "جاري سحب المعرفة من المستودعات الخارجية..."
          # تشغيل سكريبت السحب الخاص بك (مع تجاهل الأخطاء لو مستودع مساحته ضخمة)
          python init_koda.py || echo "تم سحب أقصى قدر ممكن من المعرفة في حدود المساحة"
          
          # مسح أي ملفات PDF أو فيديو فوراً لمنع امتلاء السيرفر أثناء التدريب
          find . -name "*.pdf" -type f -delete
          find . -name "*.mp4" -type f -delete

      - name: 🧠 6. بدء المعالجة والتفكير المنطقي (التدريب العميق)
        continue-on-error: true
        run: |
          echo "بدء معالجة اللغة الطبيعية والتدريب على البيانات المجمعة..."
          # هنا بنشغل سكريبت التدريب الرئيسي بتاعك
          python main_brain.py || python koda_brain.py

      - name: 💾 7. اللحظة الحاسمة: تحميل المجلد والملفات النهائية
        uses: actions/upload-artifact@v4
        if: always()  # هذا الأمر السحري يجبر السيرفر على رفع الملفات النهائية حتى لو حدث خطأ
        with:
          name: Koda-Universal-Final-Brain
          path: |
            *.npz
            *.h5
            *.json
            brain_storage/
            models/
            knowledge_source/
