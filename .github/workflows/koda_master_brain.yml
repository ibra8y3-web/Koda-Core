name: Koda-Final-System
on: [push]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cleanup
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc && sudo apt-get clean
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Install All
        run: pip install numpy tensorflow torch transformers nltk scikit-learn
      - name: Run Koda
        run: |
          python init_koda.py
          python main_brain.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Koda-Final-Brain
          path: Koda_LLM/
